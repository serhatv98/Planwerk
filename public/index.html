<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlanWerk</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#1a2342;--navy2:#232f52;--teal:#00897b;--teal2:#00bfa5;--amber:#e6a817;--coral:#c0392b;--green:#2e7d52;--ice:#e8edf8;--ice2:#f4f7ff;--muted:#8a94b0;--border:#dde3f0;--r:10px;--sh:0 2px 16px rgba(26,35,66,.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--ice2);color:var(--navy);min-height:100vh}
.screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--navy);flex-direction:column;gap:16px}
.box{background:#fff;border-radius:16px;padding:40px;width:360px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.logo-big{font-size:28px;font-weight:700;color:var(--navy);margin-bottom:4px}.logo-big span{color:var(--teal)}
.sub{font-size:11px;color:var(--muted);margin-bottom:24px;font-family:"DM Mono",monospace}
.lf{margin-bottom:14px}
.ll{font-size:11px;font-family:"DM Mono",monospace;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:block;margin-bottom:5px}
.li{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-family:"DM Sans",sans-serif;font-size:14px;outline:none;background:var(--ice2)}
.li:focus{border-color:var(--teal);background:#fff}
.lbtn{width:100%;padding:12px;background:var(--teal);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;margin-top:4px}
.lbtn:hover{background:var(--teal2)}
.lerr{color:var(--coral);font-size:12px;margin-top:8px;display:none}
.foot{font-size:10px;color:rgba(255,255,255,.25);font-family:"DM Mono",monospace}
.ltog{display:flex;background:rgba(255,255,255,.1);border-radius:20px;overflow:hidden}
.lbg{padding:5px 12px;border:none;background:transparent;color:rgba(255,255,255,.6);font-size:12px;cursor:pointer;font-family:"DM Mono",monospace;transition:all .2s}
.lbg.active{background:var(--teal);color:#fff}
/* TOPBAR */
.topbar{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.18)}
.logo{font-size:15px;font-weight:700}.logo span{color:var(--teal2)}
.ubadge{background:rgba(255,255,255,.12);border-radius:20px;padding:4px 12px;font-size:12px;display:flex;align-items:center;gap:6px}
.udot{width:6px;height:6px;border-radius:50%;background:var(--teal2)}
.tr{display:flex;align-items:center;gap:6px}
.sbox{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:6px 14px;color:#fff;font-size:13px;font-family:"DM Sans",sans-serif;width:160px;outline:none}
.sbox::placeholder{color:rgba(255,255,255,.4)}
.nbtn{position:relative;background:rgba(255,255,255,.1);border:none;border-radius:8px;color:#fff;font-size:13px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:600}
.nbadge{position:absolute;top:3px;right:3px;background:var(--coral);color:#fff;border-radius:50%;width:14px;height:14px;font-size:9px;display:flex;align-items:center;justify-content:center}
.tbtn{background:rgba(255,255,255,.1);border:none;border-radius:8px;color:rgba(255,255,255,.8);font-size:11px;padding:5px 10px;cursor:pointer;font-family:"DM Sans",sans-serif;font-weight:500}
.tbtn:hover{background:rgba(255,255,255,.2)}
.ham{display:none;background:rgba(255,255,255,.1);border:none;border-radius:8px;color:#fff;font-size:18px;width:36px;height:36px;cursor:pointer;align-items:center;justify-content:center}
/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 54px)}
.sidebar{width:250px;background:var(--navy2);flex-shrink:0;padding:16px 0;display:flex;flex-direction:column}
.slbl{font-size:10px;font-family:"DM Mono",monospace;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:0 18px 8px}
.pi{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;border-left:3px solid transparent;transition:background .15s}
.pi:hover{background:rgba(255,255,255,.06)}
.pi.active{background:rgba(0,137,123,.18);border-left-color:var(--teal2)}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pnm{font-size:13px;font-weight:500;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.apb{margin:12px 14px 0;padding:9px;border:1px dashed rgba(255,255,255,.2);border-radius:var(--r);background:transparent;color:rgba(255,255,255,.5);font-size:12px;cursor:pointer;width:calc(100% - 28px);font-family:"DM Sans",sans-serif}
.apb:hover{border-color:var(--teal2);color:var(--teal2)}
.sfoot{margin-top:auto;padding:12px 18px;font-size:9px;color:rgba(255,255,255,.2);font-family:"DM Mono",monospace;line-height:1.6}
.main{flex:1;padding:24px;overflow-y:auto}
/* PROJECT */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.pt{font-size:20px;font-weight:600}.pm{font-size:13px;color:var(--muted);margin-top:3px}
.bp{background:var(--teal);color:#fff;border:none;border-radius:var(--r);padding:9px 18px;font-size:13px;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif;white-space:nowrap}
.bp:hover{background:var(--teal2)}
/* STATS */
.sbar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.sc{background:#fff;border-radius:var(--r);padding:14px 18px;flex:1;min-width:110px;border:1px solid var(--border);box-shadow:var(--sh)}
.slb{font-size:10px;color:var(--muted);font-family:"DM Mono",monospace;text-transform:uppercase;letter-spacing:.5px}
.sv{font-size:22px;font-weight:600;color:var(--navy);margin-top:4px;font-family:"DM Mono",monospace}
.ss{font-size:11px;color:var(--muted);margin-top:2px}
/* FILTER */
.fbar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.fb{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:12px;cursor:pointer;font-family:"DM Sans",sans-serif;color:var(--muted)}
.fb.active,.fb:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
/* CARD */
.card{background:#fff;border-radius:var(--r);border:1px solid var(--border);margin-bottom:12px;box-shadow:var(--sh);overflow:hidden;border-left:4px solid #ccc}
.card[data-st="Ausstehend"]{border-left-color:#8a94b0}
.card[data-st="In Bearbeitung"]{border-left-color:var(--teal)}
.card[data-st="In Pruefung"]{border-left-color:var(--amber)}
.card[data-st="Freigegeben"]{border-left-color:var(--green)}
.card[data-st="Abgeschlossen"]{border-left-color:#9c27b0}
.chdr{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none}
.pill{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500;font-family:"DM Mono",monospace;white-space:nowrap;flex-shrink:0}
.s-aus{background:#e8edf8;color:#4a5580}.s-inb{background:#e0f4f1;color:#00695c}
.s-pru{background:#fff3e0;color:#e65100}.s-frei{background:#e8f5e9;color:#2e7d32}
.s-abg{background:#f3e5f5;color:#6a1b9a}
.cnm{font-size:14px;font-weight:600;flex:1}
.cm{display:flex;gap:14px;flex-shrink:0}
.chip{font-size:11px;color:var(--muted);font-family:"DM Mono",monospace}
.chev{font-size:12px;color:var(--muted);transition:transform .2s;margin-left:4px}
.card.open .chev{transform:rotate(180deg)}
.rbg{display:inline-flex;align-items:center;background:#fff3e0;color:#e65100;border-radius:10px;padding:2px 8px;font-size:10px;font-family:"DM Mono",monospace;font-weight:500;margin-left:6px}
.cbody{display:none;border-top:1px solid var(--border);padding:18px;background:var(--ice2)}
.card.open .cbody{display:block}
.dg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.ds{background:#fff;border-radius:8px;padding:14px;border:1px solid var(--border)}
.dt{font-size:10px;font-family:"DM Mono",monospace;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px}
/* IO ITEMS */
.ioitem{padding:6px 0;border-bottom:1px solid var(--ice);display:flex;align-items:center;gap:8px}
.ioitem:last-child{border-bottom:none}
.ionm{font-size:13px;font-weight:500;flex:1}
.iometa{font-size:11px;color:var(--muted);font-family:"DM Mono",monospace}
.ioempty{font-size:12px;color:var(--muted);font-style:italic}
.io-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.io-ready{background:var(--green)}.io-waiting{background:var(--amber)}.io-none{background:var(--border)}
/* HR */
.hr{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--ice)}.hr:last-child{border-bottom:none}
.hrl{font-size:12px;color:var(--muted)}.hrv{font-size:13px;font-weight:600;font-family:"DM Mono",monospace}
/* PERSONS */
.prow{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--ice);font-size:12px}
.prow:last-child{border-bottom:none}
.prole{font-size:10px;font-family:"DM Mono",monospace;text-transform:uppercase;color:var(--muted);min-width:68px}
/* STATUS HISTORY */
.shwrap{background:#fff;border-radius:8px;padding:12px 14px;margin-top:12px;border:1px solid var(--border)}
.shttl{font-size:10px;font-family:"DM Mono",monospace;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px}
.shrow{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--ice);font-size:12px;flex-wrap:wrap}
.shrow:last-child{border-bottom:none}
.shby{color:var(--muted);font-family:"DM Mono",monospace;font-size:11px}
.shtm{color:var(--muted);font-size:10px;font-family:"DM Mono",monospace;margin-left:auto}
.shdur{color:var(--teal);font-size:10px;font-family:"DM Mono",monospace}
/* ACCEPT */
.abanner{background:#fff8e1;border:1px solid var(--amber);border-radius:8px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.abanner-text{flex:1;font-size:13px}
/* ACTIONS */
.acts{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap;align-items:center}
.bs{padding:7px 12px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif;border:1px solid var(--border);background:#fff;color:var(--navy)}
.bs:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.bw{border-color:#ffcdd2;background:#fff5f5;color:var(--coral)}.bw:hover{background:var(--coral);color:#fff;border-color:var(--coral)}
.bd{border-color:#b71c1c;background:#ffebee;color:#b71c1c}.bd:hover{background:#b71c1c;color:#fff}
.brev{border:1px solid var(--amber);background:#fff8e1;color:#b36a00;padding:7px 12px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif}
.brev:hover{background:var(--amber);color:#fff}
.stsel{padding:7px 10px;border-radius:7px;border:1px solid var(--border);font-family:"DM Sans",sans-serif;font-size:12px;color:var(--navy);background:#fff;cursor:pointer}
/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,35,66,.55);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:26px;width:540px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(26,35,66,.25)}
.msm{width:400px}.mlg{width:660px}
.mtt{font-size:16px;font-weight:600;color:var(--navy);margin-bottom:18px}
.fg{margin-bottom:12px}
.fl{font-size:11px;font-weight:500;color:var(--muted);margin-bottom:4px;display:block;font-family:"DM Mono",monospace;text-transform:uppercase;letter-spacing:.5px}
.fi,.fsel,.fta{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-family:"DM Sans",sans-serif;font-size:13px;color:var(--navy);background:var(--ice2);outline:none}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--teal);background:#fff}
.fta{min-height:70px;resize:vertical}.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.bca{padding:9px 16px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--muted);font-size:13px;cursor:pointer;font-family:"DM Sans",sans-serif}
.bsv{padding:9px 20px;border:none;border-radius:8px;background:var(--teal);color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif}
/* IO FORM */
.iosec{background:var(--ice2);border-radius:8px;padding:12px;margin-bottom:10px}
.iost{font-size:11px;font-weight:600;color:var(--navy);margin-bottom:8px;font-family:"DM Mono",monospace;text-transform:uppercase}
.ioe{display:grid;grid-template-columns:1.5fr 1.5fr 1.5fr 1fr auto;gap:5px;margin-bottom:6px;align-items:end}
.req-label::after{content:" *";color:var(--coral)}
.iorm{padding:8px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:15px;border-radius:6px}
.iorm:hover{color:var(--coral);background:#fff0ee}
.aio{font-size:12px;color:var(--teal);background:none;border:none;cursor:pointer;padding:3px 0;font-family:"DM Sans",sans-serif}
/* NOTIF */
.npanel{position:fixed;top:62px;right:16px;width:340px;background:#fff;border-radius:12px;box-shadow:0 8px 40px rgba(26,35,66,.18);border:1px solid var(--border);z-index:150;display:none;max-height:480px;overflow-y:auto}
.npanel.open{display:block}
.nhdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ntit{font-size:13px;font-weight:600}
.nra{font-size:11px;color:var(--teal);cursor:pointer;border:none;background:none;font-family:"DM Sans",sans-serif}
.nit{padding:12px 16px;border-bottom:1px solid var(--ice);font-size:12px;line-height:1.5}
.nit.unread{background:#f0faf8}
.nit.type-request{border-left:3px solid var(--amber)}
.nit.type-ready{border-left:3px solid var(--green)}
.nit.type-accepted{border-left:3px solid var(--teal)}
.ntm{font-size:10px;color:var(--muted);font-family:"DM Mono",monospace;margin-top:3px}
.nem{padding:20px;text-align:center;color:var(--muted);font-size:13px}
/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:18px}
.tab{padding:8px 18px;border:none;background:transparent;font-size:13px;font-family:"DM Sans",sans-serif;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:600}
.tabpanel{display:none}.tabpanel.active{display:block}
/* USER TABLE */
.utbl{width:100%;border-collapse:collapse;font-size:13px}
.utbl th{text-align:left;padding:8px 10px;font-size:10px;font-family:"DM Mono",monospace;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border)}
.utbl td{padding:8px 10px;border-bottom:1px solid var(--ice)}
.utbl tr:hover td{background:var(--ice2)}
.rbadge2{padding:2px 8px;border-radius:10px;font-size:10px;font-family:"DM Mono",monospace}
.ra{background:#e8f5e9;color:#2e7d32}.ru{background:var(--ice);color:var(--muted)}
.mitem{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--ice);font-size:13px}
.mitem:last-child{border-bottom:none}
/* DRAWER */
.dov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150}
.dov.open{display:block}
.drawer{position:fixed;top:0;left:-270px;width:250px;height:100vh;background:var(--navy2);z-index:160;transition:left .25s ease;padding:50px 0 20px;overflow-y:auto;display:flex;flex-direction:column}
.drawer.open{left:0}
.dcl{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.1);border:none;border-radius:6px;color:#fff;font-size:16px;width:30px;height:30px;cursor:pointer}
.ferr{color:var(--coral);font-size:12px;margin-top:6px;display:none}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
@media(max-width:680px){
  .sidebar{display:none}.ham{display:flex !important}
  .sbox{width:90px;font-size:11px}.tbtn{font-size:10px;padding:4px 7px}
  .main{padding:12px}.dg{grid-template-columns:1fr}.sbar{gap:8px}
  .sc{min-width:calc(50% - 4px);flex:none;padding:10px 12px}
  .fr{grid-template-columns:1fr}.fr3{grid-template-columns:1fr 1fr}
  .ioe{grid-template-columns:1fr 1fr}
  .ioe>div:nth-child(3),.ioe>div:nth-child(4){grid-column:span 1}
  .topbar{padding:0 12px}.logo{font-size:13px}.ubadge{display:none}
  .modal{padding:18px 14px}
  .cm{display:none}
  .npanel{right:8px;width:calc(100vw - 16px)}
}
</style>
</head>

<div class="screen" id="scLogin">
  <div style="position:fixed;top:12px;right:16px;z-index:10">
    <div class="ltog">
      <button class="lbg active" id="loginDE" onclick="setLoginLang('de')">DE</button>
      <button class="lbg" id="loginEN" onclick="setLoginLang('en')">EN</button>

  <div class="box">
